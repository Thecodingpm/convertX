[variables]
NIXPACKS_PHP_UPLOAD_MAX_FILESIZE = "500M"
NIXPACKS_PHP_POST_MAX_SIZE = "500M"

[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "ffmpeg", "python312", "python312Packages.pip"]

[phases.install]
cmds = [
    "apt-get update && apt-get install -y ghostscript imagemagick libreoffice-writer libreoffice-calc libreoffice-impress",
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "pip install pypdf python-docx reportlab pillow pdfplumber openpyxl --break-system-packages --no-cache-dir"
]

[phases.build]
cmds = [
    "cp .env.example .env",
    "mkdir -p storage/framework/{sessions,views,cache/data} storage/logs bootstrap/cache",
    "chmod -R 775 storage bootstrap/cache",
    "php artisan key:generate --force",
    "mkdir -p database",
    "touch database/database.sqlite",
    "php artisan migrate --force",
    "php artisan config:clear",
    "php artisan route:clear",
    "php artisan view:clear",
    "php artisan storage:link || true"
]
