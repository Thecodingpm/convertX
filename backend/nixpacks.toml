[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "ffmpeg", "python312", "python312Packages.pip"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "pip install pypdf python-docx reportlab pillow pdfplumber openpyxl --break-system-packages --no-cache-dir"
]

[phases.build]
cmds = [
    "cp .env.example .env",
    "php artisan key:generate --force",
    "mkdir -p database",
    "touch database/database.sqlite",
    "php artisan migrate --force",
    "php artisan config:clear",
    "php artisan route:clear",
    "php artisan storage:link || true"
]

